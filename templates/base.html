<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HR Attrition Analytics{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Load FontAwesome via CDN for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="modern-nav">
        <div class="nav-brand">Data Science Attrition Analyze</div>
        <ul class="nav-links">
            <li><a href="{{ url_for('home') }}" class="{% if request.endpoint == 'home' %}active{% endif %}"><i class="fas fa-home"></i> Home </a></li>
            <li><a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}"><i class="fas fa-chart-pie"></i> Dashboard Analisis</a></li>
            <li><a href="{{ url_for('predict_view') }}" class="{% if request.endpoint == 'predict_view' %}active{% endif %}"><i class="fas fa-brain"></i> Predict Attrition</a></li>
        </ul>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>

<style>
/* Navbar injected globally */
.modern-nav {
    background-color: #134e4a; /* Teal 900 */
    padding: 12px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
}

.modern-nav .nav-brand {
    color: white;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.5px;
}

.modern-nav ul.nav-links {
    list-style: none;
    display: flex;
    gap: 15px;
    margin: 0;
    padding: 0;
}

.modern-nav ul.nav-links li a {
    color: #ccfbf1;
    text-decoration: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
}

.modern-nav ul.nav-links li a:hover, 
.modern-nav ul.nav-links li a.active {
    background-color: #0d9488;
    color: white;
}

@media (max-width: 768px) {
    .modern-nav {
        flex-direction: column;
        gap: 15px;
        padding: 15px;
    }
}
</style>
</body>
</html>
